<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K37B - Lớp 7B</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #667eea, #764ba2);
      color: #fff;
    }

    header {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #ffd700;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 500px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ffd700;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ffcc00;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>🏫 K37B - Lớp 7B</h1>
  <nav>
    <a href="#">Trang chủ</a>
    <a href="#">Thành viên</a>
    <a href="#">Hoạt động</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <h2>Chào mừng đến với lớp 7B 🎉</h2>
    <p>Đây là website chính thức của K37B!</p>
    <button onclick="showMsg()">Bấm vào đây 😎</button>
    <p id="msg"></p>
  </div>

  <div class="card">
    <h3>📢 Thông báo</h3>
    <p>Mai kiểm tra Toán nhớ học bài nhé!</p>
  </div>

  <div class="card">
    <h3>👥 Thành viên</h3>
    <p>Danh sách lớp sẽ cập nhật sau...</p>
  </div>
</div>

<footer>
  <p>© 2026 K37B - Lớp 7B 😎</p>
</footer>

<script>
  function showMsg() {
    document.getElementById("msg").innerHTML = "🔥 K37B mãi đỉnh! 🔥";
  }
</script>

</body>
</html>
